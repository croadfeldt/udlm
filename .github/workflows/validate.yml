# Registry validation — every type spec must validate against the meta-schema
# (tests/validate_registry.py: JSON Schema 2020-12 + $id↔version/conforms_to cross-checks).
name: validate
on:
  pull_request:
  push:
    branches: [main]
jobs:
  validate-registry:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install jsonschema pyyaml
      - run: python3 tests/validate_registry.py
      - run: python3 tests/check_estate_tokens.py
      # compat-check smoke test — compat-check.py has no --self-test flag, so at minimum
      # compile-check the tool so CI catches syntax/key-drift regressions in it
      # (compile() rather than ast.parse: catches e.g. await-outside-async that ast misses).
      # Full version-pair compat gating (old/new spec fixtures) is tracked as follow-up.
      - run: python3 -c "compile(open('registry/tools/compat-check.py').read(), 'compat-check.py', 'exec')"
