# Registry validation — every type spec must validate against the meta-schema
# (tests/validate_registry.py: JSON Schema 2020-12 + $id↔version/conforms_to cross-checks).
name: validate
on:
  pull_request:
  push:
    branches: [main]
jobs:
  validate-registry:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install jsonschema pyyaml
      - run: python3 tests/validate_registry.py
      # Instance/catalog valid-by-construction gate (realized entities, DCMGroups, catalog
      # items) + semantic checks JSON Schema can't express (process-axis family match,
      # component_id uniqueness, depends_on cycles, binding⊆depends_on). Was authored to be
      # CI-wired ("Exit non-zero if anything is invalid") but never added — so a stale check
      # false-failed unnoticed. Now enforced.
      - run: python3 registry/tools/validate.py
      - run: python3 tests/check_estate_tokens.py
      - run: python3 tests/check_session_narration.py
      - run: python3 tests/check_model_vocabulary.py
      - run: python3 tests/check_definition_single_source.py
      # Rule-ID single-source: every normative rule-ID prefix must be registered in
      # registry/rule-id-registry.yaml and defined only in its home file (ADR-028,
      # registry/rule-id-naming.md). Was authored but never CI-wired.
      - run: python3 tests/check_single_source.py
      # Repo-cleanliness gates (the nine questions — dav docs/repo-cleanliness-review.md):
      # referential integrity (Q8) + CI/signoff parity (these two ran only in signoff.sh before).
      - run: python3 tests/check_links.py
      - run: python3 tests/check_profile_tables.py
      # Rule-36 base-standard gates (G1/G2/G3/G5/G6, 2026-07-25 fleet review) with the
      # burn-down baseline ratchet — new violations fail; baselined ones warn until fixed.
      - run: python3 tests/check_type_standard.py
      - run: python3 registry/tools/generate_type_catalog.py --check
      - run: python3 tests/check_standards_registered.py || echo "::warning::standards-register warnings (soft gate, matches signoff)"
      - run: python3 -c "compile(open('registry/tools/compat-check.py').read(), 'compat-check.py', 'exec')"
      # Real §9 gate: every changed type spec must declare a sufficient version bump
      # vs origin/main (compat-check old-vs-new). New types are skipped.
      - run: python3 tests/ci_compat_gate.py origin/main
