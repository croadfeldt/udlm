# category, so if the provider bumps that capability's version the accreditation no longer matches and
# the sovereignty claim reverts to self_asserted until re-attested (§3.3.1). It attests the Compute
# category of libvirt-vm-sp's "EU Sovereign Compute" capability — NOT its Network category.
