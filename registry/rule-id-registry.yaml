# UDLM Rule-ID Registry — the single source of truth for normative rule-ID prefixes.
#
# Convention: registry/rule-id-naming.md (normative). Enforced by tests/check_single_source.py
# (CI). ADR-028 records the decision.
#
# One prefix = one rule family = one home file. A rule DEFINITION (a `| `PFX-NNN` | … |` table
# row) may appear ONLY in that prefix's `home`; every other mention is a citation. To add a
# rule family, register its prefix here first — an unregistered prefix fails CI.
#
# `baseline_spread` grandfathers a prefix that today is still defined in more than its home
# (the dedup debt from 2026-07-15 / the ADR-027 collisions). These are burned down in the
# follow-up renumber PR; a baseline that no longer spreads is reported stale.

version: "1.0.0"

