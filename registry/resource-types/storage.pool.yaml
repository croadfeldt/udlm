# UDLM Resource Type Specification — Storage.Pool (YAML; validated against resource-type-spec.schema.json).
#
# A host-local storage POOL that aggregates physical drives into a fault-tolerant capacity source from
# which datasets/volumes are carved — one generic shape for ZFS zpools, md arrays, hardware-RAID
# virtual disks, LVM VGs, btrfs pools. Distinct
# from Storage.Cluster (a DISTRIBUTED multi-node system, Ceph) and from Storage.Volume (a CONSUMABLE
# volume a workload attaches): a Pool is the single-host aggregation layer between the drives
# (the physical drives) and the datasets (Storage.Dataset). It owns the redundancy topology — the
# vdev grouping — which a flat "dataset on host" edge would lose, exactly as PSU→feed captures power
# redundancy the coarse "host on UPS" edge drops.
#
# ADOPT (not absorb), core-tenets T5: schemas are not restated — only an identity join + version-pinned
# pointer. The pool/vdev vocabulary is OpenZFS's; the capacity/redundancy alignment is SNIA Swordfish
# StoragePool's; a provider (zfs) naturalizes the concrete zpool.
$id: https://udlm.dev/registry/udlm/0.1/Storage.Pool/0.3.0
conforms_to: udlm/0.1
uuid: 91b18748-7f03-461a-9ee1-6cd77e8367c7
resource_type: Storage.Pool
version: 0.3.0
family: Resource
status: active
metadata:
  display_name: Storage Pool
  description: 'A host-local storage pool aggregating physical drives into a redundancy-protected capacity source
    that datasets/volumes are carved from. The concrete technology (ZFS zpool, mdraid array, hardware-RAID virtual
    disk, LVM VG, btrfs) is the PROVIDER, declared on the instance and in adopts[] — never in the type name. Owns
    the vdev/redundancy topology so a derived shutdown honors it: a pool stops after the datasets it backs and before
    the drives it aggregates. Grounded in OpenZFS (zpool) + SNIA Swordfish StoragePool.'
  maintainer: udlm-registry
  origination_timestamp: '2026-07-13T00:00:00Z'
adopts:
- standard: OpenZFS
  version: 2.x
  standard_name: zpool / vdev
  role: pool-and-vdev topology vocabulary (raidz/mirror/stripe, members, health)
  source: https://openzfs.github.io/openzfs-docs/
  license: CDDL-1.0
  license_compatibility: compatible-reference
  disposition: tier1_value
- standard: SNIA-Swordfish
  version: '1.2'
  standard_name: StoragePool
  role: capacity + data-protection alignment (StoragePool; RAIDType is the canonical cross-backend protection vocabulary
    vdevs[].raid_type maps to)
  source: https://www.snia.org/forums/smi/swordfish
  license: SNIA
  license_compatibility: compatible-reference
  disposition: tier1_value
lifecycle:
  states:
  - Intent
  - Requested
  - Realized
  - Discovered
  decommission: Provider exports/destroys the pool; Discovered reflects exported/absent. Destroying a pool destroys
    every dataset it holds — so decommission is DATA-DESTRUCTIVE and must follow the datasets in order.
spec:
  type: object
  required:
  - pool_kind
  properties:
    pool_kind:
      type: string
      enum:
      - zfs
      - md
      - hardware_raid
      - lvm
      - btrfs
      - other
      description: 'Pooling backend (provider hint; the provider is authoritative). One generic type for every redundancy
        implementation: ZFS, mdraid, a hardware RAID controller virtual disk, LVM, btrfs. Hardware-RAID pools MAY
        be declared as intent contained_by a bare-metal host: the provisioning provider (Metal3/BMC-class) derives
        its controller configuration FROM the declared pool — the host type carries no RAID fields of its own.'
      x-extensible-enum: true
    health:
      type: string
      description: Pool health as the provider reports it (ZFS ONLINE/DEGRADED/FAULTED; Swordfish Status).
    capacity:
      type: object
      properties:
        size:
          type: string
          pattern: ^[0-9]+(\.[0-9]+)?(MB|GB|TB|PB|MiB|GiB|TiB|PiB|M|G|T|P)$
          description: Total pool size.
        allocated:
          type: string
          pattern: ^[0-9]+(\.[0-9]+)?(MB|GB|TB|PB|MiB|GiB|TiB|PiB|M|G|T|P)$
        free:
          type: string
          pattern: ^[0-9]+(\.[0-9]+)?(MB|GB|TB|PB|MiB|GiB|TiB|PiB|M|G|T|P)$
    vdevs:
      type: array
      description: The redundancy topology — each vdev groups member drives under a protection scheme. Data-protection
        is per-vdev; the pool's fault tolerance is the vdev's (a raidz2 tolerates 2 lost members). The member drives
        are recorded by handle/serial; this array carries the grouping the edges can't.
      items:
        type: object
        required:
        - type
        properties:
          type:
            type: string
            enum:
            - stripe
            - mirror
            - raidz1
            - raidz2
            - raidz3
            - draid
            - raid0
            - raid1
            - raid5
            - raid6
            - raid10
            - jbod
            - cache
            - log
            - spare
            description: The NATIVE protection term for this vdev/group — authoritative, in the backend's own vocabulary
              (raidz2 is not RAID6 and is never renamed into it).
            x-extensible-enum: true
          members:
            type: array
            items:
              type: string
              description: 'A member drive of this vdev — a common-elements Reference to Hardware.StorageDevice
                (handle string or {uuid, handle} object). Members as references make disk-failure blast radius a
                graph walk: a dead drive''s inbound edges ARE the affected pools.'
            description: The physical member drives of this vdev, as references.
          raid_type:
            type: string
            enum:
            - RAID0
            - RAID1
            - RAID5
            - RAID6
            - RAID10
            - RAID50
            - RAID60
            - none
            description: The canonical SNIA Swordfish RAIDType this protection MAPS TO for cross-backend comparison
              (nearest-equivalent, declared not derived — raidz2 maps to RAID6-class tolerance while type stays
              raidz2). Optional; queries wanting "everything with >=2-disk tolerance" use this.
    properties:
      type: object
      additionalProperties:
        type: string
      description: Provider-passthrough pool properties not lifted into typed fields (e.g. compression, recordsize,
        ashift).
outputs:
  usable_capacity:
    type: string
    description: Usable capacity after redundancy overhead, once Realized.
  degraded:
    type: boolean
    description: Whether the pool is currently degraded (a member vdev is not fully redundant).
  redundancy_status:
    type: string
    description: healthy | degraded | failed — the pool-level protection state (rollup of vdev states); the binding-friendly
      form of the degraded flag.
  fault_tolerance_remaining:
    type: integer
    description: How many further member failures the pool survives right now (min across vdevs). 0 on a degraded
      mirror = the next failure loses data — the number an operator actually acts on.
relationships:
- edge_type: contained_by
  target: Compute.BareMetalHost
  cardinality: 0..1
  name: host
  description: The host whose drives make up this pool (a pool is host-local).
context:
  purpose: Models a host-local aggregation of physical drives into redundancy-protected capacity that datasets are
    carved from.
  plain_description: 'The generic redundancy group — one shape for a ZFS zpool, an md array, a hardware-RAID virtual
    disk, an LVM VG, or a btrfs pool: a set of drives on one host grouped into vdevs, each vdev carrying a protection
    scheme (mirror, raidz). The vdev topology is why the type exists — a flat dataset-on-host edge would lose which
    drives protect which data and how many failures the pool survives. It sits between the physical drives below
    and the datasets above, and orders accordingly: a pool stops after its datasets and before its drives.'
  use_when:
  - You need the drive → vdev → pool → dataset chain explicit so drive failures and maintenance map to affected
    data.
  - You need host-local capacity facts (usable after redundancy, degraded state) as data.
  - You have RAID anywhere — firmware, mdadm, zpool — and want one reusable model for it (declared hardware-RAID
    pools drive controller config at bare-metal provision time).
  not_for:
  - Distributed multi-node storage — Storage.Cluster.
  - The consumable unit workloads mount — Storage.Dataset, carved from the pool.
  - An allocatable range of IP addresses — Network.IPAddressPool is the same pool pattern in the network domain.
  - RAID fields on the host type — a host never carries RAID; it contains pools (see Compute.BareMetalHost).
  works_with:
  - Compute.BareMetalHost — the host whose drives form the pool.
  - Storage.Dataset — the datasets carved from the pool.
  - Hardware.StorageDevice — the physical member drives of the vdevs.
