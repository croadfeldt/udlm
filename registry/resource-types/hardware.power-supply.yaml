# UDLM Resource Type Specification — Hardware.PowerSupply
#
# A power supply unit (PSU) — the component that actually carries a host's power dependency. A
# chassis has one or more PSUs, and each connects to a power feed/rail that need NOT be the same.
# Modeling power at the PSU level (rather than lumping it onto the host or the facility) is what
# captures redundancy and multi-rail correctly: a coarse "host on this UPS" edge silently loses the
# second rail. Each PSU references the Facility.PowerFeed it draws from; a redundant host has several.
#
# ADOPT (not absorb): DMTF Redfish PowerSupply models the PSU (line input, power ratings, redundancy,
# status). UDLM references it and owns only identity + which feed the PSU is on.
$id: https://udlm.dev/registry/udlm/0.1/Hardware.PowerSupply/0.1.0
conforms_to: udlm/0.1
uuid: 21deac94-035a-417f-b445-be436d7b3485
resource_type: Hardware.PowerSupply
version: 0.1.0
family: Resource
entity_type: Infrastructure Resource
lifecycle_archetype: curation
portability: partial
status: active
metadata:
  display_name: Power Supply
  description: >-
    A power supply unit — a component of a chassis that draws from a power feed/rail. Modeled so power
    dependencies are accurate and redundancy-aware: a host contains one or more PSUs, each `powered_by`
    its own Facility.PowerFeed (possibly different feeds). The order/derivation tools follow the
    chassis -> PSU -> feed chain, so a host's power dependency is the union of its PSUs' feeds — no
    second rail is lost the way a single host-level power edge would.
  maintainer: udlm-registry
  origination_timestamp: "2026-07-13T00:00:00Z"

adopts:
  - standard: Redfish
    version: ">=2023.1"
    standard_name: PowerSupply (Power subsystem)
    role: PSU line-input / rating / redundancy / status vocabulary — referenced, not restated
    source: https://www.dmtf.org/standards/redfish
    license: DMTF
    license_compatibility: compatible-reference

relationships:
  - kind: contained_by
    target: Compute.BareMetalHost
    cardinality: "0..1"
    name: chassis
    description: The chassis/host this PSU is installed in.
  - kind: references
    target: Facility.PowerFeed
    cardinality: "0..n"
    name: powered_by
    description: The power feed/rail this PSU draws from. Multiple PSUs on different feeds = redundancy.

lifecycle:
  states: [Discovered, Realized, Intent]
  decommission: >-
    A PSU is a component of its chassis — it decommissions with the board. Removing the resource does
    not power anything down. Non-destructive.

spec:
  type: object
  required: []
  additionalProperties: false
  properties:
    slot:
      type: string
      description: Bay/slot identifier (e.g. PSU1).
    rating_watts:
      type: integer
      description: Rated output in watts.
    redundancy:
      type: string
      enum: [single, redundant, "n+1"]
      description: Redundancy role of this PSU within the chassis.
    input_voltage:
      type: string
      description: Line input (e.g. 120V, 240V).
outputs:
  power_state:
    type: string
    description: Last-observed PSU state (On/Off/Failed/Absent) from Redfish PowerSupply.Status.
