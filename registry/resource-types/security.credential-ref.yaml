# UDLM Resource Type Specification — Security.CredentialRef
#
# The secrets-as-reference primitive: a first-class, named REFERENCE to a credential held by a
# credential-issuing provider — never the credential VALUE. Any resource that needs a secret
# (Compute.Container env/mounts, Software.Service, an Auth Provider bind) references a
# Security.CredentialRef instead of inlining material (DCM ADR-023; governance/credentials.md).
#
# ADOPT (not absorb), core-tenets T5: the credential MODEL — types, lifetimes, assurance, rotation,
# broker flow — lives in governance/credentials.md and is NOT restated here. This type carries only the
# reference (which credential, held where, at what assurance) + resolution provenance. The value is
# produced and held by the provider and flows DIRECTLY to the authorized consumer (credentials CPX-001);
# DCM/UDLM never see, store, or relay it — only the secret_path and resolution facts are recorded.
$id: https://udlm.dev/registry/udlm/0.1/Security.CredentialRef/0.3.0
conforms_to: udlm/0.1
uuid: 7c2e9a1b-4f83-4a6d-9b21-5e0c7d3f8a42
resource_type: Security.CredentialRef
version: 0.3.0
family: Resource
status: active
metadata:
  display_name: Credential Reference
  description: >-
    A named reference to a credential held by a credential-issuing provider — the target every
    secrets-as-reference field points at (Compute.Container/Software.Service `credential_ref`, Auth
    Provider bind refs). It declares WHICH credential (closed type vocabulary), held WHERE (issuer +
    provider-side secret_path), at what assurance floor — never the value. Resolved at realization by the
    provider; the value flows directly to the authorized consumer, never through DCM. Secret material
    NEVER appears in the data model, audit, source control, or logs (governance/credentials.md §1.1).
  maintainer: udlm-registry
  origination_timestamp: "2026-07-15T00:00:00Z"

lifecycle:
  states: [Intent, Requested, Realized, Discovered]
  decommission: >-
    The reference (binding) is removed; the underlying credential's own lifecycle (rotation, revocation)
    is the credential provider's, governed by governance/credentials.md. Decommission of the reference
    does not destroy a shared credential — it detaches this consumer's binding.

spec:
  type: object
  required: [credential_type]
  additionalProperties: false
  properties:
    credential_type:
      type: string
      # The closed substrate vocabulary — governance/credentials.md §2 (the ONE list; not restated).
      enum: [api_key, jwt, x509_certificate, ssh_key, secret, signing_key, encryption_key,
             service_account_token, database_password, kubeconfig, hsm_backed_key]
      description: Which kind of credential this references — resolves to the matching Credential.* resource the issuer holds (credentials.md §2).
    issuer_ref:
      type: string
      description: >-
        Handle/uuid of the credential-issuing provider that HOLDS this credential (the provider that
        declares the credential capability — credentials.md §1.2; auth-providers.md). Advisory at authoring;
        DCM selects/binds the concrete issuer at realization.
    secret_path:
      type: string
      description: The provider-side path/handle the issuer resolves the value at (e.g. "providers/kubevirt/service-account"). Only the path is ever recorded — never the value.
    version:
      type: string
      default: latest
      description: Advisory version pin (`latest` or a specific version); the issuer resolves it and records the concrete version in outputs (audit, not the value).
    scope:
      type: object
      description: What the credential is scoped to (least-privilege) — mirrors the credential_record scope in credentials.md §5; the provider enforces.
      additionalProperties: false
      properties:
        entity_uuid: { type: string, description: "Scoped to a specific entity, when applicable." }
        operations:
          type: array
          items: { type: string }
          description: The operations this credential may perform (credentials.md operation vocabulary).
    required_assurance:
      type: string
      description: >-
        The minimum assurance the consumer requires — NIST 800-63B AAL (credentials.md §12.2). A provider
        whose credential capability cannot reach this floor is filtered out before binding (declare-and-select).

outputs:
  resolved:
    type: boolean
    description: Whether the reference has been bound to a concrete credential at the issuer (Realized). NEVER the value.
  resolved_version:
    type: string
    description: The concrete credential version the issuer bound (audit record; provider-filled). Not the value.
  first_retrieval_at:
    type: string
    description: When the credential was first retrieved by the authorized consumer (credentials.md audits first retrieval — AUD hook). Never the value.

immutable:
  - credential_type

relationships:
  - edge_type: references
    name: authenticates
    target: Identity.ServiceAccount
    cardinality: 0..1
    description: The workload/service-account identity this credential authenticates, when it is a service-account token or workload credential.
  - edge_type: references
    name: authenticates
    target: Identity.Person
    cardinality: 0..1
    description: Or the person identity, for a human-held credential.
