<svg viewBox="0 0 1040 440" xmlns="http://www.w3.org/2000/svg" font-family="Arial, Helvetica, sans-serif">
  <style>
    .title{font-size:20px;font-weight:700;fill:#111827;}
    .sub{font-size:11px;fill:#6b7280;}
    .rowlbl{font-size:11px;font-weight:700;letter-spacing:.5px;fill:#6b7280;}
    .verb{font-size:14px;font-weight:700;} .act{font-size:10px;font-style:italic;fill:#6b7280;} .arrowtxt{font-size:14px;fill:#9aa0a6;}
    .nm{font-size:15px;font-weight:700;} .ds{font-size:10.5px;} .gn{font-size:11px;font-weight:700;} .gm{font-size:10px;font-style:italic;fill:#6b7280;}
    .s1{fill:#e7f0ff;stroke:#1f6feb;stroke-width:1.5;} .s1T{fill:#0a3069;} .c1{fill:#1f6feb;}
    .s2{fill:#f3eefc;stroke:#8250df;stroke-width:1.5;} .s2T{fill:#3b1f6e;} .c2{fill:#8250df;}
    .s3{fill:#e8f5ec;stroke:#1a7f37;stroke-width:1.5;} .s3T{fill:#0f4c2a;} .c3{fill:#1a7f37;}
    .s4{fill:#fff8e1;stroke:#9a6700;stroke-width:1.5;} .s4T{fill:#6a4a00;} .c4{fill:#9a6700;}
  </style>
  <defs>
    <marker id="a" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 z" fill="#444"/></marker>
    <marker id="g" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 z" fill="#9aa0a6"/></marker>
  </defs>

  <text class="title" x="520" y="28" text-anchor="middle">The Four-State Lifecycle</text>
  <text class="sub" x="520" y="47" text-anchor="middle">the data lifecycle is four stages (acts); each stage writes into a store (state); the gap between any two stores is meaningful</text>

  <!-- LIFECYCLE row: stage = act -->
  <text class="rowlbl" transform="translate(15,96) rotate(-90)" text-anchor="middle">LIFECYCLE</text>
  <text class="verb c1" x="125" y="78" text-anchor="middle">intent</text><text class="act" x="125" y="95" text-anchor="middle">state the desired outcome</text>
  <text class="arrowtxt" x="255" y="80" text-anchor="middle">&#8594;</text>
  <text class="verb c2" x="385" y="78" text-anchor="middle">request</text><text class="act" x="385" y="95" text-anchor="middle">send the policy-derived outcome request to a provider</text>
  <text class="arrowtxt" x="515" y="80" text-anchor="middle">&#8594;</text>
  <text class="verb c3" x="645" y="78" text-anchor="middle">realize</text><text class="act" x="645" y="95" text-anchor="middle">turn the request into the outcome</text>
  <text class="arrowtxt" x="775" y="80" text-anchor="middle">&#8594;</text>
  <text class="verb c4" x="905" y="78" text-anchor="middle">discover</text><text class="act" x="905" y="95" text-anchor="middle">document what currently exists</text>

  <!-- writes-to arrows -->
  <line x1="125" y1="104" x2="125" y2="132" stroke="#444" marker-end="url(#a)"/>
  <line x1="385" y1="104" x2="385" y2="132" stroke="#444" marker-end="url(#a)"/>
  <line x1="645" y1="104" x2="645" y2="132" stroke="#444" marker-end="url(#a)"/>
  <line x1="905" y1="104" x2="905" y2="132" stroke="#444" marker-end="url(#a)"/>

  <!-- STORES row: state = what's persisted -->
  <text class="rowlbl" transform="translate(15,176) rotate(-90)" text-anchor="middle">STORES</text>
  <rect class="s1" x="30"  y="134" width="190" height="86" rx="10"/><text class="nm s1T" x="125" y="164" text-anchor="middle">Intent</text><text class="ds s1T" x="125" y="184" text-anchor="middle">what the consumer asks for</text><text class="ds s1T" x="125" y="199" text-anchor="middle">raw need, unadulterated</text>
  <rect class="s2" x="290" y="134" width="190" height="86" rx="10"/><text class="nm s2T" x="385" y="164" text-anchor="middle">Requested</text><text class="ds s2T" x="385" y="184" text-anchor="middle">enriched &amp; validated</text><text class="ds s2T" x="385" y="199" text-anchor="middle">by policy</text>
  <rect class="s3" x="550" y="134" width="190" height="86" rx="10"/><text class="nm s3T" x="645" y="164" text-anchor="middle">Realized</text><text class="ds s3T" x="645" y="184" text-anchor="middle">what the provider provisions</text><text class="ds s3T" x="645" y="199" text-anchor="middle">the confirmed configuration</text>
  <rect class="s4" x="810" y="134" width="190" height="86" rx="10"/><text class="nm s4T" x="905" y="164" text-anchor="middle">Discovered</text><text class="ds s4T" x="905" y="184" text-anchor="middle">what is observed right now</text><text class="ds s4T" x="905" y="199" text-anchor="middle">ground truth</text>

  <!-- gaps between stores -->
  <line x1="220" y1="177" x2="290" y2="177" stroke="#9aa0a6" marker-end="url(#g)"/>
  <line x1="480" y1="177" x2="550" y2="177" stroke="#9aa0a6" marker-end="url(#g)"/>
  <line x1="740" y1="177" x2="810" y2="177" stroke="#9aa0a6" marker-end="url(#g)"/>
  <text class="gn" x="255" y="250" text-anchor="middle" fill="#8250df">policy delta</text><text class="gm" x="255" y="265" text-anchor="middle">what policy changed</text>
  <text class="gn" x="515" y="250" text-anchor="middle" fill="#1a7f37">provider delta</text><text class="gm" x="515" y="265" text-anchor="middle">what the provider did</text>
  <text class="gn" x="775" y="250" text-anchor="middle" fill="#9a6700">drift</text><text class="gm" x="775" y="265" text-anchor="middle">realized vs observed</text>

  <!-- outer arc -->
  <path d="M125 220 C 200 350, 840 350, 905 220" fill="none" stroke="#444" stroke-width="1.5" stroke-dasharray="5 4" marker-end="url(#a)"/>
  <text class="gn" x="515" y="340" text-anchor="middle" fill="#111827">Intent vs Discovered</text>
  <text class="gm" x="515" y="356" text-anchor="middle">is the original need still being met?</text>
</svg>
